name: pr

on:
  pull_request:
    branches:
      - main
    paths:
      - '**/*'

concurrency:
  group: ${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ubuntu-latest:
    name: ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x
      - uses: actions/checkout@v4
      - name: 'Run: Interface filename convention check'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          python3 .github/scripts/check_csharp_interface_filenames.py $(git diff --name-only --diff-filter=ACMRT "origin/${{ github.base_ref }}...HEAD")
      - name: 'Run: Compile, Test, Pack'
        run: ./build.cmd Compile Test Pack
