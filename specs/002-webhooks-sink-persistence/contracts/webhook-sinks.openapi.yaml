openapi: 3.0.3
info:
  title: Elsa Http Webhooks Sink Management API
  version: 0.1.0
  description: API contract for managing webhook sinks used by Elsa.Http.Webhooks.
servers:
  - url: /
paths:
  /webhook-sinks:
    get:
      summary: List webhook sinks
      operationId: listWebhookSinks
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Sinks returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSinkListResponse'
    post:
      summary: Create webhook sink
      operationId: createWebhookSink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookSinkRequest'
      responses:
        '200':
          description: Sink created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /webhook-sinks/{id}:
    get:
      summary: Get webhook sink by id
      operationId: getWebhookSink
      parameters:
        - $ref: '#/components/parameters/SinkId'
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Sink returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSink'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Update webhook sink
      operationId: updateWebhookSink
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookSinkRequest'
      responses:
        '200':
          description: Sink updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Delete webhook sink
      operationId: deleteWebhookSink
      parameters:
        - $ref: '#/components/parameters/SinkId'
        - name: expectedVersion
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Sink deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /webhook-sinks/{id}/restore:
    post:
      summary: Restore webhook sink
      operationId: restoreWebhookSink
      parameters:
        - $ref: '#/components/parameters/SinkId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreWebhookSinkRequest'
      responses:
        '200':
          description: Sink restored
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  parameters:
    SinkId:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    WebhookSinkListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WebhookSink'
    WebhookSink:
      type: object
      required: [id, url, isEnabled]
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
        isEnabled:
          type: boolean
        isDeleted:
          type: boolean
        filters:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventFilter'
        headers:
          type: object
          additionalProperties:
            type: string
        version:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateWebhookSinkRequest:
      type: object
      required: [url]
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
        isEnabled:
          type: boolean
          default: true
        filters:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventFilter'
        headers:
          type: object
          additionalProperties:
            type: string
        expectedVersion:
          type: string
          nullable: true
    UpdateWebhookSinkRequest:
      type: object
      required: [url]
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        url:
          type: string
          format: uri
        isEnabled:
          type: boolean
        filters:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEventFilter'
        headers:
          type: object
          additionalProperties:
            type: string
        expectedVersion:
          type: string
          nullable: true
    RestoreWebhookSinkRequest:
      type: object
      properties:
        expectedVersion:
          type: string
          nullable: true
    WebhookEventFilter:
      type: object
      required: [eventType]
      properties:
        eventType:
          type: string
        payloadFilters:
          type: array
          items:
            $ref: '#/components/schemas/PayloadFilter'
    PayloadFilter:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string
    ApiError:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: Conflict (e.g., duplicate sink id)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
